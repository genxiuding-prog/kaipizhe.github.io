<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mediaGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mediaGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="mediaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0a0a0a"/>

  <!-- 光晕效果 -->
  <circle cx="400" cy="300" r="250" fill="url(#mediaGlow)"/>

  <!-- 报纸/媒体图标 -->
  <g transform="translate(180, 180)">
    <rect x="0" y="0" width="120" height="160" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2" rx="4"/>
    <!-- 报头 -->
    <rect x="10" y="10" width="100" height="20" fill="url(#mediaGrad1)" rx="2"/>
    <!-- 标题行 -->
    <rect x="10" y="40" width="80" height="8" fill="#8b5cf6" rx="2"/>
    <rect x="10" y="55" width="100" height="4" fill="#6366f1" rx="2"/>
    <rect x="10" y="63" width="100" height="4" fill="#6366f1" rx="2"/>
    <rect x="10" y="71" width="100" height="4" fill="#6366f1" rx="2"/>
    <!-- 图片占位 -->
    <rect x="10" y="85" width="45" height="35" fill="url(#mediaGrad2)" opacity="0.5" rx="2"/>
    <rect x="60" y="85" width="50" height="15" fill="#3b82f6" rx="2"/>
    <rect x="60" y="105" width="50" height="15" fill="#3b82f6" opacity="0.7" rx="2"/>
    <!-- 底部内容 -->
    <rect x="10" y="130" width="100" height="4" fill="#8b5cf6" rx="2"/>
    <rect x="10" y="138" width="80" height="4" fill="#6366f1" rx="2"/>
  </g>

  <!-- 新闻摘要 - 文档列表 -->
  <g transform="translate(380, 180)">
    <!-- 文档 1 -->
    <rect x="0" y="0" width="100" height="30" fill="#1a1a1a" stroke="url(#mediaGrad2)" stroke-width="1" rx="4"/>
    <rect x="10" y="8" width="60" height="6" fill="url(#mediaGrad1)" rx="2"/>
    <rect x="80" y="8" width="12" height="14" fill="url(#mediaGrad2)" rx="2"/>
    <!-- 文档 2 -->
    <rect x="0" y="35" width="100" height="30" fill="#1a1a1a" stroke="url(#mediaGrad2)" stroke-width="1" rx="4"/>
    <rect x="10" y="43" width="60" height="6" fill="url(#mediaGrad1)" rx="2"/>
    <rect x="80" y="43" width="12" height="14" fill="url(#mediaGrad2)" rx="2"/>
    <!-- 文档 3 -->
    <rect x="0" y="70" width="100" height="30" fill="#1a1a1a" stroke="url(#mediaGrad2)" stroke-width="1" rx="4"/>
    <rect x="10" y="78" width="60" height="6" fill="url(#mediaGrad1)" rx="2"/>
    <rect x="80" y="78" width="12" height="14" fill="url(#mediaGrad2)" rx="2"/>
    <!-- 文档 4 -->
    <rect x="0" y="105" width="100" height="30" fill="#1a1a1a" stroke="url(#mediaGrad2)" stroke-width="1" rx="4"/>
    <rect x="10" y="113" width="60" height="6" fill="url(#mediaGrad1)" rx="2"/>
    <rect x="80" y="113" width="12" height="14" fill="url(#mediaGrad2)" rx="2"/>
  </g>

  <!-- AI 内容增强 - 魔法棒/增强图标 -->
  <g transform="translate(580, 140)">
    <line x1="20" y1="60" x2="60" y2="20" stroke="url(#mediaGrad1)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="65" cy="15" r="12" fill="url(#mediaGrad1)"/>
    <!-- 星星火花 -->
    <polygon points="65,5 68,12 75,12 68,18 70,25 65,20 60,25 62,18 55,12 62,12" fill="#fff" opacity="0.8"/>
    <circle cx="15" cy="20" r="4" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="75" cy="50" r="5" fill="#6366f1" opacity="0.6"/>
    <circle cx="10" cy="50" r="3" fill="#3b82f6" opacity="0.6"/>
  </g>

  <!-- 媒体内容 AI 增强 - 画笔/编辑图标 -->
  <g transform="translate(120, 380)">
    <path d="M 60 10 L 75 25 L 45 55 L 25 65 L 35 45 Z" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2"/>
    <path d="M 60 10 L 75 25" stroke="url(#mediaGrad1)" stroke-width="3"/>
    <circle cx="68" cy="18" r="8" fill="url(#mediaGrad1)" opacity="0.5"/>
    <!-- 编辑效果 -->
    <line x1="10" y1="30" x2="30" y2="50" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="40" y="90" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="sans-serif">内容增强</text>
  </g>

  <!-- AI 新闻摘要 - 压缩/摘要图标 -->
  <g transform="translate(240, 380)">
    <!-- 原文档 -->
    <rect x="5" y="10" width="50" height="50" fill="#1a1a1a" stroke="url(#mediaGrad2)" stroke-width="2" rx="4"/>
    <line x1="10" y1="20" x2="50" y2="20" stroke="#6366f1" stroke-width="2"/>
    <line x1="10" y1="28" x2="50" y2="28" stroke="#6366f1" stroke-width="2"/>
    <line x1="10" y1="36" x2="50" y2="36" stroke="#6366f1" stroke-width="2"/>
    <line x1="10" y1="44" x2="50" y2="44" stroke="#6366f1" stroke-width="2"/>
    <!-- 箭头 -->
    <path d="M 60 35 L 75 35" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <!-- 摘要文档 -->
    <rect x="80" y="20" width="30" height="30" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2" rx="3"/>
    <line x1="85" y1="28" x2="105" y2="28" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="85" y1="36" x2="105" y2="36" stroke="#8b5cf6" stroke-width="2"/>
    <text x="55" y="85" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="sans-serif">新闻摘要</text>
  </g>

  <!-- 智能新闻客服 - 对话气泡 -->
  <g transform="translate(380, 380)">
    <rect x="10" y="15" width="55" height="40" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2" rx="8"/>
    <polygon points="25,55 30,50 35,55" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2"/>
    <circle cx="25" cy="30" r="5" fill="#8b5cf6"/>
    <circle cx="40" cy="30" r="5" fill="#6366f1"/>
    <circle cx="55" cy="30" r="5" fill="#3b82f6"/>
    <text x="45" y="85" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="sans-serif">智能客服</text>
  </g>

  <!-- 多模态文档解析 - 文件扫描图标 -->
  <g transform="translate(510, 380)">
    <rect x="5" y="10" width="50" height="60" fill="#1a1a1a" stroke="url(#mediaGrad1)" stroke-width="2" rx="4"/>
    <!-- 扫描线 -->
    <line x1="5" y1="35" x2="55" y2="35" stroke="url(#mediaGrad1)" stroke-width="3">
      <animate attributeName="y1" from="10" to="70" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="10" to="70" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- 文档内容 -->
    <rect x="15" y="20" width="30" height="8" fill="#8b5cf6" rx="2"/>
    <circle cx="30" cy="45" r="10" fill="url(#mediaGrad2)" opacity="0.5"/>
    <rect x="40" y="50" width="10" height="10" fill="url(#mediaGrad1)" opacity="0.6"/>
    <text x="35" y="90" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="sans-serif">文档解析</text>
  </g>

  <!-- 装饰性信号波 -->
  <g transform="translate(650, 200)" opacity="0.5">
    <circle cx="50" cy="50" r="20" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="50" cy="50" r="35" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="50" cy="50" r="50" fill="none" stroke="#3b82f6" stroke-width="2"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="560" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="sans-serif">媒体与出版</text>
</svg>
