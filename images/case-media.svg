<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="case1Grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="case1Grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="case1Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0a0a0a"/>

  <!-- 光晕效果 -->
  <circle cx="400" cy="300" r="250" fill="url(#case1Glow)"/>

  <!-- 报纸/媒体背景 -->
  <g transform="translate(200, 150)" opacity="0.1">
    <rect x="0" y="0" width="400" height="300" fill="#1a1a1a" stroke="#8b5cf6" stroke-width="2"/>
  </g>

  <!-- 主视觉 - 智能设备 -->
  <g transform="translate(280, 180)">
    <!-- 平板/手机轮廓 -->
    <rect x="50" y="20" width="220" height="320" fill="#1a1a1a" stroke="url(#case1Grad1)" stroke-width="3" rx="20"/>
    <!-- 屏幕 -->
    <rect x="60" y="35" width="200" height="280" fill="url(#case1Grad1)" opacity="0.1" rx="10"/>
    <!-- 屏幕内容 - 新闻列表 -->
    <rect x="70" y="50" width="180" height="40" fill="#1a1a1a" stroke="url(#case1Grad2)" stroke-width="1" rx="8"/>
    <rect x="80" y="60" width="100" height="10" fill="url(#case1Grad1)" rx="4"/>
    <rect x="80" y="75" width="160" height="6" fill="#6366f1" rx="2"/>

    <rect x="70" y="100" width="180" height="40" fill="#1a1a1a" stroke="url(#case1Grad2)" stroke-width="1" rx="8"/>
    <rect x="80" y="110" width="100" height="10" fill="url(#case1Grad1)" rx="4"/>
    <rect x="80" y="125" width="160" height="6" fill="#6366f1" rx="2"/>

    <rect x="70" y="150" width="180" height="40" fill="#1a1a1a" stroke="url(#case1Grad2)" stroke-width="1" rx="8"/>
    <rect x="80" y="160" width="100" height="10" fill="url(#case1Grad1)" rx="4"/>
    <rect x="80" y="175" width="160" height="6" fill="#6366f1" rx="2"/>

    <rect x="70" y="200" width="180" height="40" fill="#1a1a1a" stroke="url(#case1Grad2)" stroke-width="1" rx="8"/>
    <rect x="80" y="210" width="100" height="10" fill="url(#case1Grad1)" rx="4"/>
    <rect x="80" y="225" width="160" height="6" fill="#6366f1" rx="2"/>

    <!-- 底部导航 -->
    <rect x="60" y="290" width="200" height="15" fill="#1a1a1a" stroke="url(#case1Grad1)" stroke-width="1" rx="4"/>
    <circle cx="100" cy="298" r="4" fill="#8b5cf6"/>
    <circle cx="130" cy="298" r="4" fill="#6366f1"/>
    <circle cx="160" cy="298" r="4" fill="#3b82f6"/>
    <circle cx="190" cy="298" r="4" fill="#8b5cf6"/>
  </g>

  <!-- AI 元素 - 悬浮球 -->
  <g transform="translate(520, 220)">
    <circle cx="60" cy="60" r="50" fill="url(#case1Grad1)" opacity="0.2"/>
    <circle cx="60" cy="60" r="35" fill="url(#case1Grad1)" opacity="0.4"/>
    <circle cx="60" cy="60" r="20" fill="url(#case1Grad1)"/>
    <!-- AI 眼睛 -->
    <ellipse cx="50" cy="55" rx="6" ry="8" fill="#ffffff"/>
    <ellipse cx="70" cy="55" rx="6" ry="8" fill="#ffffff"/>
    <circle cx="50" cy="55" r="3" fill="#1a1a1a"/>
    <circle cx="70" cy="55" r="3" fill="#1a1a1a"/>
    <!-- 微笑 -->
    <path d="M 50 70 Q 60 78 70 70" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 功能标签 -->
  <g transform="translate(150, 420)">
    <rect x="0" y="0" width="100" height="50" fill="#1a1a1a" stroke="url(#case1Grad1)" stroke-width="2" rx="10"/>
    <text x="50" y="30" text-anchor="middle" fill="#ffffff" font-size="14" font-family="sans-serif">AI 导读</text>
  </g>

  <g transform="translate(280, 420)">
    <rect x="0" y="0" width="120" height="50" fill="#1a1a1a" stroke="url(#case1Grad2)" stroke-width="2" rx="10"/>
    <text x="60" y="30" text-anchor="middle" fill="#ffffff" font-size="14" font-family="sans-serif">AI 采编辅助</text>
  </g>

  <g transform="translate(430, 420)">
    <rect x="0" y="0" width="100" height="50" fill="#1a1a1a" stroke="url(#case1Grad1)" stroke-width="2" rx="10"/>
    <text x="50" y="30" text-anchor="middle" fill="#ffffff" font-size="14" font-family="sans-serif">AI 悬浮球</text>
  </g>

  <!-- 装饰性数据流 -->
  <g stroke="#8b5cf6" stroke-width="2" opacity="0.4" stroke-dasharray="5,5">
    <line x1="100" y1="200" x2="180" y2="200"/>
    <line x1="100" y1="240" x2="180" y2="240"/>
    <line x1="100" y1="280" x2="180" y2="280"/>
  </g>

  <!-- 标题 -->
  <text x="400" y="540" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="sans-serif">某晚报智能体解决方案</text>
  <text x="400" y="575" text-anchor="middle" fill="#a1a1aa" font-size="16" font-family="sans-serif">媒体行业典型案例</text>
</svg>
