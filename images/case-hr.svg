<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="case3Grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="case3Grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="case3Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#0a0a0a"/>

  <!-- 光晕效果 -->
  <circle cx="400" cy="300" r="250" fill="url(#case3Glow)"/>

  <!-- 平台界面背景 -->
  <g transform="translate(120, 100)">
    <!-- 主界面窗口 -->
    <rect x="0" y="0" width="560" height="380" fill="#1a1a1a" stroke="url(#case3Grad1)" stroke-width="2" rx="12"/>
    <!-- 顶部栏 -->
    <rect x="0" y="0" width="560" height="50" fill="#1a1a1a" stroke="url(#case3Grad2)" stroke-width="1" rx="12"/>
    <rect x="0" y="40" width="560" height="10" fill="#1a1a1a" opacity="0.5"/>
    <!-- 窗口控制按钮 -->
    <circle cx="20" cy="25" r="6" fill="#8b5cf6"/>
    <circle cx="40" cy="25" r="6" fill="#6366f1"/>
    <circle cx="60" cy="25" r="6" fill="#3b82f6"/>
  </g>

  <!-- 数字员工卡片 -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="120" height="140" fill="#1a1a1a" stroke="url(#case3Grad1)" stroke-width="2" rx="10"/>
    <!-- 人物图标 -->
    <circle cx="60" cy="40" r="25" fill="url(#case3Grad1)" opacity="0.5"/>
    <circle cx="60" cy="35" r="18" fill="url(#case3Grad1)"/>
    <path d="M 35 75 Q 35 50 60 50 Q 85 50 85 75 L 85 85 L 35 85 Z" fill="url(#case3Grad1)"/>
    <!-- 工牌 -->
    <rect x="35" y="90" width="50" height="15" fill="#6366f1" rx="4"/>
    <text x="60" y="101" text-anchor="middle" fill="#ffffff" font-size="10" font-family="sans-serif">数字员工</text>
    <!-- 状态指示 -->
    <circle cx="105" cy="15" r="8" fill="#8b5cf6"/>
  </g>

  <!-- AI 智能体卡片 -->
  <g transform="translate(290, 150)">
    <rect x="0" y="0" width="120" height="140" fill="#1a1a1a" stroke="url(#case3Grad2)" stroke-width="2" rx="10"/>
    <!-- AI 图标 -->
    <circle cx="60" cy="40" r="25" fill="url(#case3Grad2)" opacity="0.5"/>
    <circle cx="60" cy="40" r="20" fill="url(#case3Grad2)"/>
    <!-- AI 眼睛 -->
    <circle cx="52" cy="38" r="5" fill="#ffffff"/>
    <circle cx="68" cy="38" r="5" fill="#ffffff"/>
    <circle cx="52" cy="38" r="2" fill="#1a1a1a"/>
    <circle cx="68" cy="38" r="2" fill="#1a1a1a"/>
    <!-- 微笑 -->
    <path d="M 50 50 Q 60 58 70 50" stroke="#ffffff" stroke-width="2" fill="none"/>
    <text x="60" y="101" text-anchor="middle" fill="#ffffff" font-size="10" font-family="sans-serif">AI 智能体</text>
  </g>

  <!-- 人力资源专家卡片 -->
  <g transform="translate(430, 150)">
    <rect x="0" y="0" width="120" height="140" fill="#1a1a1a" stroke="#8b5cf6" stroke-width="2" rx="10"/>
    <!-- 专家图标 - 博士帽/书籍 -->
    <circle cx="60" cy="35" r="20" fill="#8b5cf6"/>
    <path d="M 40 70 L 60 55 L 80 70" fill="#6366f1"/>
    <rect x="45" y="70" width="30" height="25" fill="#6366f1"/>
    <text x="60" y="101" text-anchor="middle" fill="#ffffff" font-size="10" font-family="sans-serif">人力专家</text>
  </g>

  <!-- 社群资源卡片 -->
  <g transform="translate(570, 150)">
    <rect x="0" y="0" width="120" height="140" fill="#1a1a1a" stroke="#8b5cf6" stroke-width="2" rx="10"/>
    <!-- 人群/社群图标 -->
    <circle cx="40" cy="35" r="15" fill="url(#case3Grad1)"/>
    <path d="M 25 65 Q 25 45 40 45 Q 55 45 55 65" fill="url(#case3Grad1)"/>
    <circle cx="70" cy="40" r="12" fill="url(#case3Grad2)"/>
    <path d="M 58 65 Q 58 50 70 50 Q 82 50 82 65" fill="url(#case3Grad2)"/>
    <circle cx="55" cy="45" r="10" fill="#8b5cf6"/>
    <text x="60" y="101" text-anchor="middle" fill="#ffffff" font-size="10" font-family="sans-serif">社群资源</text>
  </g>

  <!-- 数据看板 -->
  <g transform="translate(150, 320)">
    <rect x="0" y="0" width="540" height="140" fill="#1a1a1a" stroke="url(#case3Grad1)" stroke-width="2" rx="10"/>
    <!-- 标题 -->
    <rect x="15" y="15" width="150" height="25" fill="url(#case3Grad1)" opacity="0.5" rx="4"/>
    <text x="90" y="33" text-anchor="middle" fill="#ffffff" font-size="14" font-family="sans-serif">人力资源数据看板</text>
    <!-- 数据图表 -->
    <rect x="30" y="55" width="40" height="70" fill="url(#case3Grad1)"/>
    <rect x="80" y="40" width="40" height="85" fill="url(#case3Grad2)"/>
    <rect x="130" y="60" width="40" height="65" fill="#8b5cf6"/>
    <rect x="180" y="35" width="40" height="90" fill="#6366f1"/>
    <rect x="230" y="50" width="40" height="75" fill="#3b82f6"/>
    <!-- 数据标签 -->
    <text x="50" y="150" text-anchor="middle" fill="#a1a1aa" font-size="10">招聘</text>
    <text x="100" y="150" text-anchor="middle" fill="#a1a1aa" font-size="10">培训</text>
    <text x="150" y="150" text-anchor="middle" fill="#a1a1aa" font-size="10">绩效</text>
    <text x="200" y="150" text-anchor="middle" fill="#a1a1aa" font-size="10">考勤</text>
    <text x="250" y="150" text-anchor="middle" fill="#a1a1aa" font-size="10">薪酬</text>
  </g>

  <!-- 标题 -->
  <text x="400" y="540" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="sans-serif">某国企人力资源 AI 数字员工平台</text>
  <text x="400" y="575" text-anchor="middle" fill="#a1a1aa" font-size="16" font-family="sans-serif">人力资源行业典型案例</text>
</svg>
